services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: bkoagent-postgres-1
    environment:
      POSTGRES_USER: bko
      POSTGRES_PASSWORD: bko_secret
      POSTGRES_DB: bkoagent
    volumes:
      - bkoagent_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - bkoagent_default
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bkoagent-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bko
      DB_PASS: bko_secret
      DB_NAME: bkoagent
      EMBEDDING_DIMENSIONS: 1536
      NODE_ENV: production
      JWT_SECRET: bko-dev-secret-change-in-production
      JWT_EXPIRES_IN: 8h
      PORT: 3111
    ports:
      - "3111:3111"
    depends_on:
      - postgres
    networks:
      - bkoagent_default
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bkoagent-frontend
    environment:
      BACKEND_URL: http://backend:3111
      SESSION_SECRET: bko-agent-session-secret-dev-32-chars-ok
      PORT: 3210
    ports:
      - "3210:3210"
    depends_on:
      - backend
    networks:
      - bkoagent_default
    restart: unless-stopped

volumes:
  bkoagent_pgdata:
    external: true

networks:
  bkoagent_default:
    external: true
