services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: bko
      POSTGRES_PASSWORD: bko_secret
      POSTGRES_DB: bkoagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bko -d bkoagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bko
      DB_PASS: bko_secret
      DB_NAME: bkoagent
      NODE_ENV: development
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

volumes:
  pgdata:
